<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apache Flink API Stack</title>
  <style>
    :root {
      --color-background-primary: #ffffff;
      --color-background-secondary: #f5f4f0;
      --color-text-primary: #1a1a18;
      --color-text-secondary: #5f5e5a;
      --color-border-tertiary: rgba(0,0,0,0.15);
      --font-sans: 'Anthropic Sans', system-ui, -apple-system, sans-serif;
      --border-radius-lg: 12px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --color-background-primary: #1a1a18;
        --color-background-secondary: #2c2c2a;
        --color-text-primary: #e8e6de;
        --color-text-secondary: #9c9a92;
        --color-border-tertiary: rgba(255,255,255,0.15);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--color-background-primary);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px;
      min-height: 100vh;
    }
    h1 {
      font-size: 15px;
      font-weight: 500;
      color: var(--color-text-secondary);
      margin-bottom: 24px;
      letter-spacing: 0.01em;
    }
    svg {
      width: 100%;
      max-width: 680px;
    }

    /* ── color ramps ── */
    .c-green rect, .c-green circle, .c-green ellipse { fill: #EAF3DE; stroke: #3B6D11; }
    .c-green .t, .c-green .th { fill: #27500A; }
    .c-green .ts { fill: #3B6D11; }

    .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #E1F5EE; stroke: #0F6E56; }
    .c-teal .t, .c-teal .th { fill: #085041; }
    .c-teal .ts { fill: #0F6E56; }

    .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #EEEDFE; stroke: #534AB7; }
    .c-purple .t, .c-purple .th { fill: #3C3489; }
    .c-purple .ts { fill: #534AB7; }

    .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #F1EFE8; stroke: #5F5E5A; }
    .c-gray .t, .c-gray .th { fill: #444441; }
    .c-gray .ts { fill: #5F5E5A; }

    @media (prefers-color-scheme: dark) {
      .c-green rect, .c-green circle, .c-green ellipse { fill: #27500A; stroke: #9FE1CB; }
      .c-green .t, .c-green .th { fill: #C0DD97; }
      .c-green .ts { fill: #9FE1CB; }

      .c-teal rect, .c-teal circle, .c-teal ellipse { fill: #085041; stroke: #5DCAA5; }
      .c-teal .t, .c-teal .th { fill: #9FE1CB; }
      .c-teal .ts { fill: #5DCAA5; }

      .c-purple rect, .c-purple circle, .c-purple ellipse { fill: #3C3489; stroke: #AFA9EC; }
      .c-purple .t, .c-purple .th { fill: #CECBF6; }
      .c-purple .ts { fill: #AFA9EC; }

      .c-gray rect, .c-gray circle, .c-gray ellipse { fill: #444441; stroke: #B4B2A9; }
      .c-gray .t, .c-gray .th { fill: #D3D1C7; }
      .c-gray .ts { fill: #B4B2A9; }
    }

    /* ── text classes ── */
    .t  { font-family: var(--font-sans); font-size: 14px; font-weight: 400; fill: var(--color-text-primary); }
    .th { font-family: var(--font-sans); font-size: 14px; font-weight: 500; fill: var(--color-text-primary); }
    .ts { font-family: var(--font-sans); font-size: 12px; font-weight: 400; fill: var(--color-text-secondary); }

    /* ── structural helpers ── */
    .arr { fill: none; stroke: var(--color-text-secondary); stroke-width: 1.5; }
    .leader { fill: none; stroke: var(--color-text-secondary); stroke-width: 0.5; stroke-dasharray: 4 3; }

    /* ── node hover ── */
    .node { cursor: pointer; }
    .node:hover rect, .node:hover circle, .node:hover ellipse { opacity: 0.85; }

    /* standalone page vars for arrow/border colors */
    :root {
      --t: var(--color-text-secondary);
      --s: var(--color-text-secondary);
      --p: var(--color-text-primary);
    }
  </style>
</head>
<body>
  <h1>Apache Flink API Stack</h1>

  <svg viewBox="0 0 680 760" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
      <marker id="arrow-dash" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
        <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </marker>
    </defs>

    <!-- Title -->
    <text class="ts" x="340" y="34" text-anchor="middle" dominant-baseline="central" style="font-size:13px">Apache Flink API stack (top = highest abstraction)</text>
    <line x1="80" y1="44" x2="220" y2="44" stroke-width="0.5" opacity="0.4" stroke="#888"/>
    <line x1="460" y1="44" x2="600" y2="44" stroke-width="0.5" opacity="0.4" stroke="#888"/>

    <!-- Legend -->
    <rect x="40" y="58" width="12" height="12" rx="2" fill="#EAF3DE" stroke="#3B6D11"/>
    <text class="ts" x="58" y="69">Connectors</text>
    <rect x="148" y="58" width="12" height="12" rx="2" fill="#E1F5EE" stroke="#0F6E56"/>
    <text class="ts" x="166" y="69">Table / SQL</text>
    <rect x="262" y="58" width="12" height="12" rx="2" fill="#EEEDFE" stroke="#534AB7"/>
    <text class="ts" x="280" y="69">DataStream layer</text>
    <rect x="410" y="58" width="12" height="12" rx="2" fill="#F1EFE8" stroke="#5F5E5A"/>
    <text class="ts" x="428" y="69">Runtime</text>

    <!-- ── LAYER 1: Connectors & formats ─────────────────────────── -->
    <g class="node c-green">
      <rect x="40" y="90" width="600" height="72" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="114" text-anchor="middle" dominant-baseline="central">Connectors &amp; formats</text>
      <text class="ts" x="340" y="134" text-anchor="middle" dominant-baseline="central">Kafka · Kinesis · JDBC · S3 · Iceberg · Pulsar · Filesystem</text>
      <text class="ts" x="340" y="152" text-anchor="middle" dominant-baseline="central">Avro · Protobuf · JSON · Parquet · ORC · CSV</text>
    </g>

    <!-- arrow: Connectors -> Table -->
    <line x1="340" y1="162" x2="340" y2="192" class="arr" marker-end="url(#arrow)" stroke="#888"/>

    <!-- ── LAYER 2: Table API & Flink SQL ────────────────────────── -->
    <g class="node c-teal">
      <rect x="40" y="196" width="600" height="78" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="222" text-anchor="middle" dominant-baseline="central">Table API &amp; Flink SQL</text>
      <text class="ts" x="340" y="242" text-anchor="middle" dominant-baseline="central">Relational — compiles to DataStream plans</text>
      <text class="ts" x="340" y="260" text-anchor="middle" dominant-baseline="central">SELECT · JOIN · window TVFs · MATCH_RECOGNIZE · ML_PREDICT</text>
    </g>

    <!-- PyFlink side bracket spanning Table + DataStream -->
    <line x1="644" y1="196" x2="654" y2="196" stroke="#888" stroke-width="0.5" opacity="0.45"/>
    <line x1="654" y1="196" x2="654" y2="530" stroke="#888" stroke-width="0.5" opacity="0.45"/>
    <line x1="644" y1="530" x2="654" y2="530" stroke="#888" stroke-width="0.5" opacity="0.45"/>
    <text class="ts" x="668" y="360" text-anchor="middle" dominant-baseline="central" transform="rotate(90 668 360)">PyFlink</text>

    <!-- arrow: Table -> DataStream layer (straight down center) -->
    <line x1="340" y1="274" x2="340" y2="318" class="arr" marker-end="url(#arrow)" stroke="#888"/>

    <!-- ── LAYER 3: DataStream layer (dashed container) ──────────── -->
    <rect x="40" y="322" width="596" height="210" rx="14" fill="none" stroke="#888" stroke-width="0.5" stroke-dasharray="5 4" opacity="0.45"/>
    <text class="ts" x="58" y="342" dominant-baseline="central" opacity="0.55">DataStream API layer</text>

    <!-- DataStream core -->
    <g class="node c-purple">
      <rect x="56" y="352" width="178" height="76" rx="10" stroke-width="0.5"/>
      <text class="th" x="145" y="376" text-anchor="middle" dominant-baseline="central">DataStream API</text>
      <text class="ts" x="145" y="396" text-anchor="middle" dominant-baseline="central">map · filter · keyBy</text>
      <text class="ts" x="145" y="412" text-anchor="middle" dominant-baseline="central">window · connect</text>
    </g>

    <!-- FlinkCEP -->
    <g class="node c-purple">
      <rect x="252" y="352" width="172" height="76" rx="10" stroke-width="0.5"/>
      <text class="th" x="338" y="372" text-anchor="middle" dominant-baseline="central">FlinkCEP</text>
      <text class="ts" x="338" y="392" text-anchor="middle" dominant-baseline="central">Pattern matching</text>
      <text class="ts" x="338" y="410" text-anchor="middle" dominant-baseline="central">library on DataStream</text>
    </g>

    <!-- Flink Agents -->
    <g class="node c-purple">
      <rect x="442" y="352" width="172" height="76" rx="10" stroke-width="0.5"/>
      <text class="th" x="528" y="372" text-anchor="middle" dominant-baseline="central">Flink Agents</text>
      <text class="ts" x="528" y="392" text-anchor="middle" dominant-baseline="central">Event-driven AI agents</text>
      <text class="ts" x="528" y="410" text-anchor="middle" dominant-baseline="central">Preview — Flink 2.x</text>
    </g>

    <!-- Process Functions / PTFs -->
    <g class="node c-purple">
      <rect x="56" y="448" width="558" height="70" rx="10" stroke-width="0.5"/>
      <text class="th" x="335" y="470" text-anchor="middle" dominant-baseline="central">Process Functions / PTFs</text>
      <text class="ts" x="335" y="490" text-anchor="middle" dominant-baseline="central">Timers · side outputs · raw state · @StateHint · driving modes</text>
    </g>

    <!-- DOTTED arrow: Table API / Flink SQL directly invokes PTFs -->
    <path d="M 640 255 L 640 483 L 616 483" fill="none" stroke="#1D9E75" stroke-width="1.2" stroke-dasharray="6 3" marker-end="url(#arrow-dash)" opacity="0.85"/>
    <text x="648" y="390" text-anchor="start" dominant-baseline="central" fill="#1D9E75" opacity="0.9" font-size="10" font-family="system-ui, sans-serif" transform="rotate(90 648 390)">CALL / TVF</text>

    <!-- arrow: DataStream layer -> Runtime -->
    <line x1="340" y1="532" x2="340" y2="572" class="arr" marker-end="url(#arrow)" stroke="#888"/>

    <!-- ── LAYER 4: Runtime ───────────────────────────────────────── -->
    <g class="c-gray">
      <rect x="40" y="576" width="600" height="56" rx="10" stroke-width="0.5"/>
      <text class="th" x="340" y="596" text-anchor="middle" dominant-baseline="central">Flink runtime &amp; execution engine</text>
      <text class="ts" x="340" y="616" text-anchor="middle" dominant-baseline="central">Task scheduling · checkpointing · state backends · fault tolerance</text>
    </g>
  </svg>
</body>
</html>
